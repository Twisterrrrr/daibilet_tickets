# ============================================
# Дайбилет — prod + staging на одном VPS
# 4 домена: daibilet.ru, admin.daibilet.ru, staging.daibilet.ru, admin-staging.daibilet.ru
# API под /api/ (без отдельных api-доменов)
# ============================================

limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=general:10m rate=60r/s;
limit_req_zone $binary_remote_addr zone=admin_zone:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=staging_api:10m rate=30r/s;

# HTTP → webroot для certbot + редирект на HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name daibilet.ru www.daibilet.ru admin.daibilet.ru staging.daibilet.ru admin-staging.daibilet.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ============================================
# PROD — daibilet.ru (сайт + API)
# ============================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name daibilet.ru www.daibilet.ru;

    ssl_certificate /etc/letsencrypt/live/daibilet.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/daibilet.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript;

    client_max_body_size 10m;

    # API → Backend
    location /api/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://daibilet-prod-backend:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Uploads
    location /uploads/ {
        alias /var/www/uploads/;
        add_header Cache-Control "public, max-age=86400";
    }

    # Next.js static
    location /_next/static/ {
        proxy_pass http://daibilet-prod-frontend:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Frontend (всё остальное)
    location / {
        limit_req zone=general burst=100 nodelay;
        proxy_pass http://daibilet-prod-frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# ============================================
# PROD Admin — admin.daibilet.ru
# ============================================
