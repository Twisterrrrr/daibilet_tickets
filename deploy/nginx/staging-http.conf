# HTTP-only config for first boot (before SSL certs).
# Use staging.conf after running certbot.

map $host $staging_upstream {
  admin-staging.daibilet.ru staging_admin;
  default staging_frontend;
}

upstream staging_frontend {
  server daibilet-staging-frontend:3000;
}

upstream staging_backend {
  server daibilet-staging-backend:4000;
}

upstream staging_admin {
  server daibilet-staging-admin:5173;
}

server {
  listen 80 default_server;
  listen [::]:80 default_server;
  server_name staging.daibilet.ru api-staging.daibilet.ru admin-staging.daibilet.ru;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location /api/ {
    proxy_pass http://staging_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }

  location / {
    proxy_pass http://$staging_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}
