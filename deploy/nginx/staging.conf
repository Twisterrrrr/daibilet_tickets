upstream staging_frontend {
  server daibilet-staging-frontend:3000;
}

upstream staging_backend {
  server daibilet-staging-backend:4000;
}

upstream staging_admin {
  server daibilet-staging-admin:5173;
}

server {
  listen 80;
  listen [::]:80;
  server_name staging.daibilet.ru api-staging.daibilet.ru admin-staging.daibilet.ru;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name staging.daibilet.ru;

  ssl_certificate     /etc/letsencrypt/live/staging.daibilet.ru/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/staging.daibilet.ru/privkey.pem;

  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_types text/plain text/css application/json application/javascript;

  client_max_body_size 10m;

  location /api/ {
    proxy_pass http://staging_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }

  location / {
    proxy_pass http://staging_frontend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name admin-staging.daibilet.ru;

  ssl_certificate     /etc/letsencrypt/live/staging.daibilet.ru/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/staging.daibilet.ru/privkey.pem;

  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_types text/plain text/css application/json application/javascript;

  client_max_body_size 10m;

  location / {
    proxy_pass http://staging_admin;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

