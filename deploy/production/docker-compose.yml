version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: daibilet-postgres
    restart: unless-stopped
    command: postgres -c shared_buffers=512MB -c work_mem=16MB -c maintenance_work_mem=128MB
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-daibilet}
      POSTGRES_USER: ${POSTGRES_USER:-daibilet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - daibilet-prod-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-daibilet}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: daibilet-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - daibilet-prod-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../..
      dockerfile: Dockerfile.backend
    container_name: daibilet-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-daibilet}:${POSTGRES_PASSWORD}@daibilet-postgres:5432/${POSTGRES_DB:-daibilet}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@daibilet-redis:6379
      TC_API_TOKEN: ${TC_API_TOKEN}
      TC_WIDGET_TOKEN: ${TC_WIDGET_TOKEN}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://daibilet.ru,https://admin.daibilet.ru}
      ADMIN_INITIAL_EMAIL: ${ADMIN_INITIAL_EMAIL:-admin@daibilet.ru}
      ADMIN_INITIAL_PASSWORD: ${ADMIN_INITIAL_PASSWORD:?ADMIN_INITIAL_PASSWORD is required}
      APP_URL: ${APP_URL:-https://daibilet.ru}
      PAYMENT_PROVIDER: YOOKASSA
      PORT: 4000
    networks:
      - daibilet-prod-net

  frontend:
    build:
      context: ../..
      dockerfile: Dockerfile.frontend
    container_name: daibilet-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      INTERNAL_API_URL: http://daibilet-backend:4000/api/v1
      NEXT_PUBLIC_API_URL: /api/v1
      NEXT_PUBLIC_APP_URL: ${APP_URL:-https://daibilet.ru}
      NEXT_PUBLIC_TC_WIDGET_TOKEN: ${TC_WIDGET_TOKEN}
      NEXT_PUBLIC_YM_ID: ${NEXT_PUBLIC_YM_ID:-}
    networks:
      - daibilet-prod-net

  admin:
    build:
      context: ../..
      dockerfile: Dockerfile.admin
    container_name: daibilet-admin
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - daibilet-prod-net

  nginx:
    image: nginx:alpine
    container_name: daibilet-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
      - admin
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/production.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_certbot_conf:/etc/letsencrypt
      - nginx_certbot_www:/var/www/certbot
      - uploads_data:/var/www/uploads:ro
    networks:
      - daibilet-prod-net

volumes:
  postgres_data:
  redis_data:
  nginx_certbot_conf:
  nginx_certbot_www:
  uploads_data:

networks:
  daibilet-prod-net:
    name: daibilet-prod-net
    driver: bridge

