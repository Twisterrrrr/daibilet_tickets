version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: daibilet-staging-postgres
    restart: unless-stopped
    command: postgres -c shared_buffers=512MB -c work_mem=16MB -c maintenance_work_mem=128MB
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-daibilet_staging}
      POSTGRES_USER: ${POSTGRES_USER:-daibilet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data_staging:/var/lib/postgresql/data
    networks:
      - daibilet-staging-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-daibilet}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: daibilet-staging-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD_STAGING:-${REDIS_PASSWORD:-staging_redis_password}}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data_staging:/data
    networks:
      - daibilet-staging-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD_STAGING:-${REDIS_PASSWORD:-staging_redis_password}}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../..
      dockerfile: Dockerfile.backend
    container_name: daibilet-staging-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-daibilet}:${POSTGRES_PASSWORD}@daibilet-staging-postgres:5432/${POSTGRES_DB:-daibilet_staging}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD_STAGING:-${REDIS_PASSWORD:-staging_redis_password}}@daibilet-staging-redis:6379
      TC_API_TOKEN: ${TC_API_TOKEN}
      TC_WIDGET_TOKEN: ${TC_WIDGET_TOKEN}
      JWT_SECRET: ${JWT_SECRET_STAGING:-${JWT_SECRET}}
      CORS_ORIGIN: ${CORS_ORIGIN_STAGING:-https://staging.daibilet.ru,https://admin-staging.daibilet.ru}
      ADMIN_INITIAL_EMAIL: ${ADMIN_INITIAL_EMAIL:-admin@daibilet.ru}
      ADMIN_INITIAL_PASSWORD: ${ADMIN_INITIAL_PASSWORD:?ADMIN_INITIAL_PASSWORD is required}
      APP_URL: ${APP_URL_STAGING:-https://staging.daibilet.ru}
      PAYMENT_PROVIDER: STUB
      PORT: 4000
    networks:
      - daibilet-staging-net

  frontend:
    build:
      context: ../..
      dockerfile: Dockerfile.frontend
    container_name: daibilet-staging-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      INTERNAL_API_URL: http://daibilet-staging-backend:4000/api/v1
      NEXT_PUBLIC_API_URL: /api/v1
      NEXT_PUBLIC_APP_URL: ${APP_URL_STAGING:-https://staging.daibilet.ru}
      NEXT_PUBLIC_TC_WIDGET_TOKEN: ${TC_WIDGET_TOKEN}
      NEXT_PUBLIC_YM_ID: ""
    networks:
      - daibilet-staging-net

  admin:
    build:
      context: ../..
      dockerfile: Dockerfile.admin
    container_name: daibilet-staging-admin
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - daibilet-staging-net

  nginx:
    image: nginx:alpine
    container_name: daibilet-staging-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
      - admin
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/staging.conf:/etc/nginx/conf.d/default.conf:ro
      - ../nginx/certbot/conf:/etc/letsencrypt:ro
      - ../nginx/certbot/www:/var/www/certbot
    networks:
      - daibilet-staging-net

volumes:
  postgres_data_staging:
  redis_data_staging:

networks:
  daibilet-staging-net:
    name: daibilet-staging-net
    driver: bridge
