# ============================================
# Дайбилет — Production docker-compose
# Запуск: docker compose -f docker-compose.prod.yml up -d --build
# ============================================

services:
  # --- PostgreSQL ---
  postgres:
    image: postgres:16-alpine
    container_name: daibilet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-daibilet}
      POSTGRES_USER: ${POSTGRES_USER:-daibilet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - daibilet-net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-daibilet}']
      interval: 10s
      timeout: 5s
      retries: 5
    # НЕ пробрасываем порт наружу в production

  # --- Redis ---
  redis:
    image: redis:7-alpine
    container_name: daibilet-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    networks:
      - daibilet-net
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Backend (NestJS) ---
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: daibilet-backend
    restart: unless-stopped
    volumes:
      - uploads_data:/var/www/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-daibilet}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-daibilet}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379
      TC_API_TOKEN: ${TC_API_TOKEN}
      TC_WIDGET_TOKEN: ${TC_WIDGET_TOKEN}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://daibilet.ru,https://admin.daibilet.ru}
      ADMIN_INITIAL_EMAIL: ${ADMIN_INITIAL_EMAIL:-admin@daibilet.ru}
      ADMIN_INITIAL_PASSWORD: ${ADMIN_INITIAL_PASSWORD:?ADMIN_INITIAL_PASSWORD is required}
      PORT: 4000
    networks:
      - daibilet-net
    # Порт не пробрасываем — доступ через Nginx

  # --- Frontend (Next.js) ---
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: daibilet-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      INTERNAL_API_URL: http://backend:4000/api/v1
      NEXT_PUBLIC_API_URL: /api/v1
      NEXT_PUBLIC_APP_URL: ${APP_URL:-https://daibilet.ru}
      NEXT_PUBLIC_TC_WIDGET_TOKEN: ${TC_WIDGET_TOKEN}
      NEXT_PUBLIC_YM_ID: ${NEXT_PUBLIC_YM_ID:-}
    networks:
      - daibilet-net

  # --- Admin Panel (Vite SPA → Nginx) ---
  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
    container_name: daibilet-admin
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - daibilet-net

  # --- Nginx (reverse proxy + SSL) ---
  nginx:
    image: nginx:alpine
    container_name: daibilet-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
      - admin
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
      - uploads_data:/var/www/uploads:ro
    networks:
      - daibilet-net

  # --- Certbot (SSL certificates) ---
  certbot:
    image: certbot/certbot
    container_name: daibilet-certbot
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # Автоматический renewal каждые 12 часов
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data:
  redis_data:
  certbot_conf:
  certbot_www:
  uploads_data:

networks:
  daibilet-net:
    driver: bridge
