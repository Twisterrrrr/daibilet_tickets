# ============================================
# Дайбилет — Staging (тестовое окружение)
# Запуск: docker compose -f docker-compose.staging.yml -p daibilet-staging up -d --build
# Требует: docker network create daibilet-net (если ещё не создана prod)
# ============================================
# Отличия от prod: PAYMENT_PROVIDER=STUB, отдельные БД/Redis/volumes,
# домены staging.daibilet.ru, admin-staging.daibilet.ru
# ============================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: daibilet-staging-postgres
    restart: unless-stopped
    command: postgres -c shared_buffers=512MB -c work_mem=16MB -c maintenance_work_mem=128MB
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-daibilet_staging}
      POSTGRES_USER: ${POSTGRES_USER:-daibilet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data_staging:/var/lib/postgresql/data
    networks:
      - daibilet-net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-daibilet}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: daibilet-staging-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD_STAGING:-${REDIS_PASSWORD}}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data_staging:/data
    networks:
      - daibilet-net
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD_STAGING:-${REDIS_PASSWORD}}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: daibilet-staging-backend
    restart: unless-stopped
    volumes:
      - uploads_data_staging:/var/www/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-daibilet}:${POSTGRES_PASSWORD}@daibilet-staging-postgres:5432/${POSTGRES_DB:-daibilet_staging}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD_STAGING:-${REDIS_PASSWORD}}@daibilet-staging-redis:6379
      TC_API_TOKEN: ${TC_API_TOKEN}
      TC_WIDGET_TOKEN: ${TC_WIDGET_TOKEN}
      JWT_SECRET: ${JWT_SECRET_STAGING:-${JWT_SECRET}}
      CORS_ORIGIN: ${CORS_ORIGIN_STAGING:-https://staging.daibilet.ru,https://admin-staging.daibilet.ru}
      ADMIN_INITIAL_EMAIL: ${ADMIN_INITIAL_EMAIL:-admin@daibilet.ru}
      ADMIN_INITIAL_PASSWORD: ${ADMIN_INITIAL_PASSWORD:?ADMIN_INITIAL_PASSWORD is required}
      APP_URL: ${APP_URL_STAGING:-https://staging.daibilet.ru}
      PAYMENT_PROVIDER: STUB
      PORT: 4000
    networks:
      - daibilet-net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: daibilet-staging-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      INTERNAL_API_URL: http://daibilet-staging-backend:4000/api/v1
      NEXT_PUBLIC_API_URL: /api/v1
      NEXT_PUBLIC_APP_URL: ${APP_URL_STAGING:-https://staging.daibilet.ru}
      NEXT_PUBLIC_TC_WIDGET_TOKEN: ${TC_WIDGET_TOKEN}
      NEXT_PUBLIC_YM_ID: ""
    networks:
      - daibilet-net

  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
    container_name: daibilet-staging-admin
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - daibilet-net

volumes:
  postgres_data_staging:
  redis_data_staging:
  uploads_data_staging:
    name: uploads_staging

networks:
  daibilet-net:
    external: true
