; E3 — PgBouncer pool config
; Ограничивает соединения к Postgres при SSR + админ + workers

[databases]
daibilet = host=postgres port=5432 dbname=daibilet

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt
pool_mode = transaction
max_client_conn = 200
default_pool_size = 20
min_pool_size = 5
reserve_pool_size = 5
server_idle_timeout = 600
query_wait_timeout = 120
log_connections = 1
log_disconnections = 1
