<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <title>Teplohod widget test</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        padding: 24px;
        background: #f5f5f7;
      }
      .container {
        max-width: 960px;
        margin: 0 auto;
      }
      .widget-wrapper {
        margin-top: 24px;
        padding: 16px;
        background: #ffffff;
        border-radius: 12px;
        box-shadow: 0 4px 12px rgba(15, 23, 42, 0.08);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Teplohod embed test</h1>
      <p>
        Этот тест использует локальный скрипт <code>/teplohod.js</code> и один виджет с
        <code>data-event-id</code>. Замените значение <code>12345</code> на реальный ID события
        (число от teplohod.info или UUID нашего события, если тестируете локально).
      </p>
      <div class="widget-wrapper">
        <div
          class="db-teplohod-widget"
          data-event-id="12345"
          data-lang="ru"
          data-theme="light"
          data-layout="compact"
        ></div>
      </div>
    </div>

    <!-- Скрипт виджета с текущего фронтенд-хоста -->
    <script src="/teplohod.js" async></script>
  </body>
  </html>
